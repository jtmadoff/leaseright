<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LeaseRight</title>
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0B; font-family: ui-sans-serif, -apple-system, "Inter", system-ui, sans-serif; }
  /* Splash — visible while Babel compiles */
  #splash {
    position: fixed; inset: 0; background: #0A0A0B;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    z-index: 9999; transition: opacity 220ms ease; pointer-events: none;
  }
  #splash.gone { opacity: 0; }
  .splash-mark {
    width: 24px; height: 24px; background: #F5A524; color: #0A0A0B;
    font-family: ui-monospace, "JetBrains Mono", monospace; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center; letter-spacing: 0.5px;
  }
  .splash-pulse {
    width: 6px; height: 6px; border-radius: 50%; background: #22C55E;
    animation: pulse 1.1s ease-in-out infinite;
  }
  .splash-text {
    font-family: ui-monospace, monospace; font-size: 10.5px;
    color: #6B6B74; letter-spacing: 1.5px; text-transform: uppercase;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  /* Global smoothness */
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  ::selection { background: #F5A524; color: #0A0A0B; }
</style>
</head>
<body>
<div id="splash">
  <div class="splash-mark">L</div>
  <div class="splash-pulse"></div>
  <div class="splash-text">Loading LeaseRight</div>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/atoms.jsx"></script>

<script type="text/babel" src="components/other-views.jsx"></script>

<script type="text/babel" src="components/inbox-view.jsx"></script>
<script type="text/babel" src="components/module-views.jsx"></script>
<script type="text/babel" src="components/app.jsx"></script>
</body>
</html>
